<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>极简hover练习</title>
    <style>
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

            .btn:hover {
                background-color: #e67e22;
                color: black;
            }
    </style>
</head>
<body>
    <a href="#" class="btn">鼠标放我身上</a>
</body>
</html>
