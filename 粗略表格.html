<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>罗德岛注册表格简略版</title>
    <style type="text/css">
        td {
            background: lightgray;
            color: blue;
        }

        th {
            background: red;
            color: black
        }

        .big {
            background: #008877;
            color: black;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>
    <form action="#" method="post">
        <table border="1" bordercolor="blue" cellpadding="3" align="center" width="600" height="600">
            <caption><em><strong>罗德岛注册表格简略版</strong></em></caption>
            <tr>
                <th colspan="4"><strong>基本信息</strong></th>
            </tr>
            <tr>
                <td class="big">姓名</td>
                <td>
                    <input type="text" name="user" placeholder="请输入姓名">
                </td>
                <td class="big">性别</td>
                <td>
                    <input type="radio" name="gender" id="men">男
                    <input type="radio" name="gender" id="women">女
                </td>
            </tr>
            <tr>
                <td class="big">出生年份</td>
                <td>
                    <select name="birth" id="birth">
                        <option value="2004">2004</option>
                        <option value="2005">2005</option>
                        <option value="2006">2006</option>
                    </select>
                </td>
                <td colspan="2">注意事项：请保持口腔干燥</td>
            </tr>
            <tr>
                <td colspan="4">
                    <input type="checkbox" name="hobby" id="hit">干
                    <input type="checkbox" name="hobby" id="do">做
                    <input type="checkbox" name="hobby" id="read">读
                </td>
            </tr>
            <tr>
                <td rowspan="2">
                    <img src="https://picsum.photos/150/150" width="75" height="150" name="Baiduxiexiu">
                </td>
                <td class="big">发票</td>
                <td colspan="2">
                    <input type="radio" name="bool" id="yes">是
                    <input type="radio" name="bool" id="no">否
                </td>
            </tr>
            <tr>
                <td colspan="3">
                    <input type="checkbox" name="like" id="cake">蛋糕
                    <input type="checkbox" name="like" id="snake">点心
                    <input type="checkbox" name="like" id="noodles">意面
                </td>
            </tr>
            <tr>
                <td colspan="4">
                    <textarea name="words" rows="4" cols="50" placeholder="请输入语录"></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="提交注册">
                </td>
                <td colspan="2">
                    <input type="reset" value="重置内容">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
