<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据筛选与排序演示</title>
</head>
<body>
    <h3>任务列表</h3>
    <input type="text" id="searchInput" placeholder="筛选任务名称">
    <button id="sortBtn">按名称排序</button>
    <ul id="taskList"></ul>

    <script>
        // 原始数据
        const tasks = [
            { name: '写日报', date: '2025-05-17' },
            { name: '开会', date: '2025-05-16' },
            { name: '代码审查', date: '2025-05-18' }
        ];

        let currentFilter = '';
        let currentSort = 'none'; // 'nameAsc' 或 'nameDesc'

        const taskListUl = document.getElementById('taskList');
        const searchInput = document.getElementById('searchInput');
        const sortBtn = document.getElementById('sortBtn');

        // 渲染函数：根据当前筛选和排序重新绘制列表
        function render() {
            // 1. 筛选：保留 name 包含搜索词的任务（不区分大小写）
            let filtered = tasks.filter(task =>
                task.name.toLowerCase().includes(currentFilter.toLowerCase())
            );

            // 2. 排序：如果是按名称升序/降序
            if (currentSort === 'nameAsc') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (currentSort === 'nameDesc') {
                filtered.sort((a, b) => b.name.localeCompare(a.name));
            }

            // 3. 渲染到 ul
            taskListUl.innerHTML = '';
            filtered.forEach(task => {
                const li = document.createElement('li');
                li.textContent = `${task.name} - ${task.date}`;
                taskListUl.appendChild(li);
            });
        }

        // 监听输入框的 input 事件，实时筛选
        searchInput.addEventListener('input', function(e) {
            currentFilter = e.target.value;
            render();
        });

        // 点击排序按钮，轮流切换排序状态
        sortBtn.addEventListener('click', function() {
            if (currentSort === 'none' || currentSort === 'nameDesc') {
                currentSort = 'nameAsc';
            } else if (currentSort === 'nameAsc') {
                currentSort = 'nameDesc';
            } else {
                currentSort = 'none';
            }
            render();
        });

        // 初始渲染
        render();
    </script>
</body>
</html>
