<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>js_practice3</title>
</head>
<body>
    <p>金额:<mark><span id="money"></span></mark>元</p>
    <p>金额:<em><span id="money1"></span></em></p>
    <script>
        let num1 = 1000;
        let num2 = 9999;
        document.getElementById('money').innerText = num1;
        document.getElementById('money1').innerText = num2;
    </script>
</body>
</html>
