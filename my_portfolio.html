<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>我的个人网页|前端练习</title>
</head>
<body>
    <h1>周东晓</h1>
    <ul>
        <li>
            <a href="#">首页</a>
        </li>
        <li>
            <a href="#">关于我</a>
        </li>
        <li>
            <a href="#">联系</a>
        </li>
    </ul>
    <figure>
        <img src="https://picsum.photos/150/150" alt="随机头像">
        <figcaption>这是一句介绍</figcaption>
    </figure>
    <p><strong><mark><u><em>我是一个性格开朗的人</em></u></mark></strong></p>
    <table>
        <caption>这是一个3x3表格</caption>
        <tr>
            <th>技能名称</th>
            <th>技能熟练度</th>
            <th>项目经验</th>
        </tr>
        <tr>
            <td>2.1</td>
            <td>2.2</td>
            <td>2.3</td>
        </tr>
        <tr>
            <td>3.1</td>
            <td>3.2</td>
            <td>3.3</td>
        </tr>
    </table>
    <ul>
        <li>hobby1</li>
        <li>hobby2</li>
    </ul>
    <form action="#" method="post">
        <table border="1" bordercolor="black" bgcolor="lightgray">
            <caption>这里是我的联系表单</caption>
            <tr>
                <th>姓名</th>
                <th>
                    <input type="text" name="my_name" id="my_name1" />
                </th>
                <th>邮箱</th>
                <th>
                    <input type="email" name="email" id="email1" />
                </th>
            </tr>
            <tr>
                <td>性别</td>
                <td>
                    <input type="radio" name="sex" id="man" />男
                    <input type="radio" name="sex" id="woman" />女
                </td>
                <td>兴趣领域</td>
                <td>
                    <input type="checkbox" name="choose" id="inside" />后端
                    <input type="checkbox" name="choose" id="outside" />前端
                    <input type="checkbox" name="choose" id="design" />设计 
                </td>
            </tr>
            <tr>
                <td>留言部分</td>
                <td colspan="3">
                    <textarea name="words" cols="10" rows="4">请输入文本</textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" name="submit" value="点击提交" />
                </td>
                <td colspan="2">
                    <input type="reset" name="reset" value="点击重置" />
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
