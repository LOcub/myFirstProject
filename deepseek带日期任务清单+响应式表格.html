<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务清单 - 带日期</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        .table-wrapper {
            overflow-x: auto; /* 小屏可滑动 */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px; /* 小于此宽度显示滚动条 */
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #f2f2f2;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>任务清单（带日期）</h2>
    <div>
        <input id="taskName" placeholder="任务名称">
        <input type="date" id="taskDate">
        <button id="addBtn">添加</button>
    </div>
    <div class="table-wrapper">
        <table id="taskTable">
            <thead>
                <tr><th>任务名称</th><th>日期</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="message"></div>

    <script>
        let tasks = [];

        const tbody = document.getElementById('tableBody');
        const taskNameInput = document.getElementById('taskName');
        const taskDateInput = document.getElementById('taskDate');
        const addBtn = document.getElementById('addBtn');
        const messageDiv = document.getElementById('message');

        function renderTable() {
            tbody.innerHTML = '';
            for (let i = 0; i < tasks.length; i++) {
                let t = tasks[i];
                let row = tbody.insertRow();
                row.insertCell(0).innerText = t.name;
                row.insertCell(1).innerText = t.date;
                let delCell = row.insertCell(2);
                let delBtn = document.createElement('button');
                delBtn.innerText = '删除';
                delBtn.onclick = (function(idx) {
                    return function() {
                        tasks.splice(idx, 1);
                        renderTable();
                        saveToLocal();
                    };
                })(i);
                delCell.appendChild(delBtn);
            }
            saveToLocal();
        }

        function saveToLocal() {
            localStorage.setItem('tasksWithDate', JSON.stringify(tasks));
        }

        function loadFromLocal() {
            let data = localStorage.getItem('tasksWithDate');
            if (data) {
                tasks = JSON.parse(data);
            } else {
                tasks = [
                    { name: '示例任务1', date: '2025-05-16' },
                    { name: '示例任务2', date: '2025-05-17' }
                ];
            }
            renderTable();
        }

        addBtn.onclick = function() {
            let name = taskNameInput.value.trim();
            let date = taskDateInput.value;
            if (name === '') {
                messageDiv.innerText = '任务名称不能为空';
                return;
            }
            if (date === '') {
                messageDiv.innerText = '请选择日期';
                return;
            }
            tasks.push({ name: name, date: date });
            renderTable();
            taskNameInput.value = '';
            taskDateInput.value = '';
            messageDiv.innerText = '';
        };

        loadFromLocal();
    </script>
</body>
</html>
