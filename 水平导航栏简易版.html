<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>极简导航练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f2f2;
            padding: 30px;
        }
        /* 导航容器 */
        .nav {
            background: #333;
            text-align: center;
        }
        /* 列表样式 */
        .nav-list {
            list-style: none;
        }
            /* 列表项改为行内块，实现水平排列 */
            .nav-list li {
                display: inline-block;
            }
                /* 链接样式 ———— 重点修改这里 */
                .nav-list li a {
                    display: inline-block;
                    padding: 12px 20px; /* 修改这行看按钮大小变化 */
                    margin: 0 5px; /* 修改这行看间距变化 */
                    background: #555;
                    color: white;
                    text-decoration: none;
                    border-radius: 8px; /* 修改这行看圆角变化 */
                    border: 1px solid transparent;
                }
                    /* 悬停效果 */
                    .nav-list li a:hover {
                        background: #ff6b6b;
                        border-color: white;
                    }
    </style>
</head>
<body>
    <div class="nav">
        <ul class="nav-list">
            <li><a href="#">首页</a></li>
            <li><a href="#">新闻</a></li>
            <li><a href="#">产品</a></li>
            <li><a href="#">关于</a></li>
        </ul>
    </div>
</body>
</html>
