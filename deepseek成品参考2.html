<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>删除功能演示</title>
</head>
<body>
    <h3>购物清单（点击删除按钮会移除对应项）</h3>
    <table border="1" id="dataTable">
        <thead><tr><th>物品</th><th>数量</th><th>操作</th>?</thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        // 1. 数据源：一个数组，每个元素是一个对象
        let items = [
            { name: "苹果", quantity: 3 },
            { name: "香蕉", quantity: 2 },
            { name: "橙子", quantity: 5 }
        ];

        const tbody = document.getElementById('tableBody');

        // 2. 渲染表格：根据数组 items 重新绘制所有行
        function renderTable() {
            tbody.innerHTML = '';   // 清空现有内容
            for (let i = 0; i < items.length; i++) {
                let item = items[i];

                // 创建行
                let row = tbody.insertRow();

                // 第一列：物品名
                let cellName = row.insertCell(0);
                cellName.innerText = item.name;

                // 第二列：数量
                let cellQty = row.insertCell(1);
                cellQty.innerText = item.quantity;

                // 第三列：删除按钮
                let cellDel = row.insertCell(2);
                let delBtn = document.createElement('button');
                delBtn.innerText = '删除';

                // 关键：给按钮绑定点击事件，删除数组中索引为 i 的元素
                // 注意：这里用闭包 (function(index) { ... })(i) 保存当前的 i 值
                delBtn.onclick = (function(index) {
                    return function() {
                        // 从数组中删除第 index 项
                        items.splice(index, 1);
                        // 重新渲染表格
                        renderTable();
                    };
                })(i);

                cellDel.appendChild(delBtn);
            }
        }

        // 3. 初始渲染
        renderTable();
    </script>
</body>
</html>
