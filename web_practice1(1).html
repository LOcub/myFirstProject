<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>쏵똑係몸훙족構</title>
    <style>
        .track {
            width: 200px;
            border-radius: 20px;
            background: #dddddd;
        }

        .progress {
            width: 0%;
            height: 20px;
            background: #28adb5;
            border-radius: 20px;
            transition: width 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="track">
        <div class="progress" id="progressBar"></div>
    </div>
    <button id="start">역迦</button>

    <script>
        const startBtn = document.getElementById('start');
        const progressDiv = document.getElementById('progressBar');

        startBtn.onclick = () => {
            let width = 0;
            let timer = setInterval(() => {
                width += 10;
                progressDiv.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(timer);
                }
            }, 100);  // 첼100봐취藤속10%，1취供냥
        };
    </script>
</body>
</html>
