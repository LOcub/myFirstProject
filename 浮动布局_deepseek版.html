<!DOCTYPE html>
<html>
<head>
    <style>
        /* 盒子模型重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
        }
        /* 公共样式 */
        .header, .sidebar, .main, .footer {
            padding: 20px;
            border: 1px solid #ccc;
        }

        .header {
            background: lightblue;
        }

        .sidebar {
            float: left;
            width: 25%;
            background: lightgreen;
            height: 300px; /* 演示高度，实际可随内容撑开 */
        }

        .main {
            float: left;
            width: 75%;
            background: lightyellow;
            height: 300px;
        }

        .footer {
            clear: both; /* 清除上面浮动，让底部换行 */
            background: lightgray;
        }
    </style>
</head>
<body>
    <div class="header">头部（header）</div>
    <div class="sidebar">左侧边栏（sidebar）</div>
    <div class="main">主体内容（main）</div>
    <div class="footer">底部（footer）</div>
</body>
</html>
