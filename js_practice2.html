<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>js_practice2</title>
    <script>
        function sayHello(name) {
            return "你好，世界" + name;
        }
        function add(a, b) {
            return a + b;
        }
    </script>
</head>
<body>
    <script>
        let message = sayHello("周东晓");
        let num1 = 3;
        let num2 = 5;
        let num3 = add(num1, num2);
        alert(message);   // 弹出：你好，世界周东晓
        alert(num3);      // 弹出：8
    </script>
</body>
</html>
